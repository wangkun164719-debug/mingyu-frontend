services:
  - type: web
    name: mingyu-frontend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: REPORT_PROVIDER
        value: deepseek
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: ANALYTICS_TIMEZONE
        value: Asia/Shanghai
      - key: PUBLIC_SITE_URL
        value: https://www.mingyuwk.com
      - key: VITE_BAIDU_TONGJI_ID
        value: 904e016c0ae35c58897ed409de422d76
      - key: ANALYTICS_API_TOKEN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
