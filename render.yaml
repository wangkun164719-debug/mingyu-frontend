services:
  - type: web
    name: mingyu-frontend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: REPORT_PROVIDER
        value: minimax
      - key: MINIMAX_MODEL
        value: MiniMax-M2.7
      - key: MINIMAX_BASE_URL
        value: https://api.minimaxi.com/v1
      - key: ANALYTICS_TIMEZONE
        value: Asia/Shanghai
      - key: PUBLIC_SITE_URL
        value: https://mingyuwk.com
      - key: ANALYTICS_API_TOKEN
        sync: false
      - key: MINIMAX_API_KEY
        sync: false
