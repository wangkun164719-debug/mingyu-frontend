name: Deploy To Aliyun ECS

on:
  workflow_dispatch:
  push:
    branches:
      - main

run-name: Deploy ${{ github.sha }} to Aliyun ECS

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create release archive
        run: |
          set -euo pipefail

          echo "Creating release archive from commit $GITHUB_SHA"
          git archive --format=tar.gz --output=release.tar.gz HEAD
          ls -lh release.tar.gz

      - name: Upload release archive
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          source: "release.tar.gz"
          target: "/tmp/"
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.4
        env:
          VITE_BAIDU_TONGJI_ID: ${{ vars.VITE_BAIDU_TONGJI_ID }}
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          envs: VITE_BAIDU_TONGJI_ID
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail

            APP_DIR=/www/wwwroot/mingyu-frontend
            TMP_DIR=/tmp/mingyu-frontend-release
            ARCHIVE=/tmp/release.tar.gz
            ENV_BAK=/tmp/mingyu-server.env.bak
            DATA_BAK=/tmp/mingyu-server-data.bak

            cleanup() {
              rm -rf "$TMP_DIR" "$ARCHIVE" "$ENV_BAK" "$DATA_BAK"
            }

            trap cleanup EXIT

            echo "==> Preparing release workspace"
            rm -rf "$TMP_DIR"
            mkdir -p "$TMP_DIR"

            echo "==> Extracting uploaded archive"
            tar -xzf "$ARCHIVE" -C "$TMP_DIR"

            if [ -f "$APP_DIR/server/.env" ]; then
              echo "==> Backing up server/.env"
              cp "$APP_DIR/server/.env" "$ENV_BAK"
            fi

            if [ -d "$APP_DIR/server/data" ]; then
              echo "==> Backing up server/data"
              rm -rf "$DATA_BAK"
              cp -r "$APP_DIR/server/data" "$DATA_BAK"
            fi

            echo "==> Syncing release files into app directory"
            mkdir -p "$APP_DIR"
            cp -r "$TMP_DIR"/. "$APP_DIR"/

            if [ -f "$ENV_BAK" ]; then
              echo "==> Restoring server/.env"
              cp "$ENV_BAK" "$APP_DIR/server/.env"
            fi

            if [ -d "$DATA_BAK" ]; then
              echo "==> Restoring server/data"
              rm -rf "$APP_DIR/server/data"
              cp -r "$DATA_BAK" "$APP_DIR/server/data"
            fi

            echo "==> Setting public site URL"
            touch "$APP_DIR/server/.env"
            if grep -q '^PUBLIC_SITE_URL=' "$APP_DIR/server/.env"; then
              sed -i 's|^PUBLIC_SITE_URL=.*|PUBLIC_SITE_URL=https://www.mingyuwk.com|' "$APP_DIR/server/.env"
            else
              printf '\nPUBLIC_SITE_URL=https://www.mingyuwk.com\n' >> "$APP_DIR/server/.env"
            fi

            echo "==> Setting frontend analytics env"
            touch "$APP_DIR/.env"
            if [ -n "${VITE_BAIDU_TONGJI_ID:-}" ]; then
              if grep -q '^VITE_BAIDU_TONGJI_ID=' "$APP_DIR/.env"; then
                sed -i "s|^VITE_BAIDU_TONGJI_ID=.*|VITE_BAIDU_TONGJI_ID=${VITE_BAIDU_TONGJI_ID}|" "$APP_DIR/.env"
              else
                printf '\nVITE_BAIDU_TONGJI_ID=%s\n' "$VITE_BAIDU_TONGJI_ID" >> "$APP_DIR/.env"
              fi
            fi

            echo "==> Installing dependencies"
            cd "$APP_DIR"
            npm ci

            echo "==> Building production assets"
            npm run build

            echo "==> Restarting PM2 app"
            pm2 delete mingyu || true
            echo "==> Inspecting deployed analytics code"
            grep -n 'about' "$APP_DIR/server/analyticsStore.js" || true
            node --input-type=module -e "import('$APP_DIR/server/analyticsStore.js').then((m) => console.log('TRACKED_PAGES=' + Object.keys(m.TRACKED_PAGES).join(',')))"
            echo "==> Inspecting existing 8787 listeners"
            ss -ltnp 2>/dev/null | grep ':8787' || true
            echo "==> Inspecting node processes"
            ps -ef | grep -E 'node|server/index|8787' | grep -v grep || true
            LEGACY_NODE_PIDS="$(ps -eo pid=,args= | awk '/node server\/index\.js/ && !/awk/ { print $1 }' || true)"
            if [ -n "$LEGACY_NODE_PIDS" ]; then
              echo "==> Stopping legacy node server processes: $LEGACY_NODE_PIDS"
              kill $LEGACY_NODE_PIDS 2>/dev/null || true
              sleep 1
              STILL_RUNNING_PIDS="$(ps -eo pid=,args= | awk '/node server\/index\.js/ && !/awk/ { print $1 }' || true)"
              if [ -n "$STILL_RUNNING_PIDS" ]; then
                echo "==> Retrying legacy process stop with sudo: $STILL_RUNNING_PIDS"
                sudo -n kill -9 $STILL_RUNNING_PIDS
              fi
            fi
            if command -v lsof >/dev/null 2>&1; then
              lsof -ti tcp:8787 | xargs -r kill -9 || true
            fi
            if command -v fuser >/dev/null 2>&1; then
              fuser -k 8787/tcp || true
            fi
            sleep 1
            ss -ltnp 2>/dev/null | grep ':8787' || true
            ps -ef | grep -E 'node|server/index|8787' | grep -v grep || true
            if ss -ltnp 2>/dev/null | grep -q ':8787'; then
              echo "ERROR: port 8787 is still occupied before starting the new analytics server."
              exit 1
            fi
            pm2 start server/index.js --name mingyu --cwd "$APP_DIR" --update-env
            pm2 save

            echo "==> Running local health check"
            : > /tmp/mingyu-health.json
            for attempt in $(seq 1 10); do
              if curl -fsS http://127.0.0.1:8787/api/health > /tmp/mingyu-health.json; then
                break
              fi

              echo "Health check attempt $attempt failed; waiting for server startup..."
              sleep 2
            done

            cat /tmp/mingyu-health.json || true
            if ! grep -q '"about"' /tmp/mingyu-health.json; then
              echo "ERROR: local health check is still returning the legacy analytics page list."
              ss -ltnp 2>/dev/null | grep ':8787' || true
              pm2 logs mingyu --nostream --lines 80 || true
              exit 1
            fi

            echo "==> Deployment completed"
